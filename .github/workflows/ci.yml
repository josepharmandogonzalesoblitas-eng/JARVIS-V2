name: CI/CD Pipeline para JARVIS V2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
    - name: Checkout del código fuente
      uses: actions/checkout@v4

    - name: Configurar Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip' # Activa el cacheado automático de pip

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Ejecutar pruebas automatizadas (Fase 5)
      # Establecer variables de entorno dummy para que los mocks no fallen por validaciones de init
      env:
        TELEGRAM_TOKEN: "mock_token"
        TELEGRAM_USER_ID: "123456789"
        GEMINI_API_KEY: "mock_gemini_key"
      run: |
        pytest tests/ -v
